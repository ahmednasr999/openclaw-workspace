<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 220px;
      padding: 14px;
      font-family: -apple-system, sans-serif;
      font-size: 13px;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
    }
    h3 { margin: 0 0 10px; font-size: 14px; color: #f1f5f9; }
    .status { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }

    .disconnected { background: #ef4444; }
    .label { color: #94a3b8; font-size: 12px; }
    .server { font-size: 11px; color: #475569; margin-top: 8px; word-break: break-all; }
  </style>
</head>
<body>
  <h3>🎯 NASR Bridge</h3>
  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="statusText">Checking...</span>
  </div>
  <div class="server">VPS: 76.13.46.115:3010</div>
  <script src="popup.js"></script>
</body>
</html>
