<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: #0f172a;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 72px;
  }
  .tag {
    display: inline-block;
    background: #3b82f6;
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 20px;
    border-radius: 4px;
    margin-bottom: 48px;
  }
  .recruiter-msg {
    background: #1e293b;
    border-radius: 16px 16px 16px 4px;
    padding: 28px 32px;
    margin-bottom: 24px;
    max-width: 700px;
  }
  .recruiter-name {
    font-size: 18px;
    color: #64748b;
    margin-bottom: 8px;
    font-weight: 600;
  }
  .recruiter-text {
    font-size: 26px;
    color: #94a3b8;
    line-height: 1.5;
    font-style: italic;
  }
  .reply-msg {
    background: #1e3a5f;
    border-radius: 16px 16px 4px 16px;
    padding: 28px 32px;
    margin-bottom: 0;
    margin-left: auto;
    max-width: 700px;
  }
  .reply-name {
    font-size: 18px;
    color: #3b82f6;
    margin-bottom: 8px;
    font-weight: 600;
    text-align: right;
  }
  .reply-text {
    font-size: 26px;
    color: #fff;
    line-height: 1.5;
    font-weight: 600;
  }
  .headline {
    font-size: 48px;
    font-weight: 900;
    color: #fff;
    line-height: 1.2;
    margin-bottom: 32px;
  }
  .headline span { color: #3b82f6; }
  .footer {
    border-top: 1px solid #1e293b;
    padding-top: 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .footer-name { font-size: 24px; font-weight: 700; color: #fff; }
  .footer-title { font-size: 20px; color: #64748b; margin-top: 4px; }
  .footer-certs { font-size: 20px; color: #3b82f6; font-weight: 600; }
</style>
</head>
<body>
  <div>
    <div class="tag">Career</div>
    <div class="recruiter-msg">
      <div class="recruiter-name">Recruiter</div>
      <div class="recruiter-text">"Ahmed, this role might feel small for you. You seem... overqualified."</div>
    </div>
    <div class="reply-msg">
      <div class="reply-name">Ahmed</div>
      <div class="reply-text">"What problem is this role trying to solve?"</div>
    </div>
  </div>

  <div>
    <div class="headline" style="margin-top:32px">
      <span>Overqualified</span> is a signal.<br>Not a verdict.
    </div>
  </div>

  <div class="footer">
    <div>
      <div class="footer-name">Ahmed Nasr</div>
      <div class="footer-title">Digital Transformation Executive</div>
    </div>
    <div class="footer-certs">PMP · CSM · CSPO</div>
  </div>
</body>
</html>
