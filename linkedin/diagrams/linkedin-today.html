<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LinkedIn Post - Monday March 9</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
    }
    .container {
      max-width: 900px;
      text-align: center;
    }
    .quote {
      font-size: 56px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.3;
      margin-bottom: 40px;
      text-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .highlight {
      color: #e94560;
      position: relative;
    }
    .highlight::after {
      content: '';
      position: absolute;
      bottom: 8px;
      left: 0;
      right: 0;
      height: 4px;
      background: #e94560;
      border-radius: 2px;
    }
    .author {
      font-size: 28px;
      color: #a0a0a0;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .tagline {
      font-size: 20px;
      color: #e94560;
      margin-top: 30px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .decoration {
      position: absolute;
      width: 300px;
      height: 300px;
      border: 2px solid rgba(233, 69, 96, 0.2);
      border-radius: 50%;
    }
    .decoration-1 { top: -50px; right: -50px; }
    .decoration-2 { bottom: -80px; left: -80px; width: 250px; height: 250px; }
  </style>
</head>
<body>
  <div class="decoration decoration-1"></div>
  <div class="decoration decoration-2"></div>
  <div class="container">
    <div class="quote">
      Every <span class="highlight">$50M transformation</span><br>
      starts with one decision:<br>
      <span class="highlight">"We're doing this."</span>
    </div>
    <div class="author">Ahmed Nasr</div>
    <div class="tagline">Digital Transformation Executive</div>
  </div>
</body>
</html>
