<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: #0f172a;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 72px;
  }
  .tag {
    display: inline-block;
    background: #8b5cf6;
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 20px;
    border-radius: 4px;
    margin-bottom: 48px;
  }
  .icon { font-size: 80px; margin-bottom: 32px; line-height: 1; }
  .headline {
    font-size: 60px;
    font-weight: 900;
    color: #fff;
    line-height: 1.1;
    margin-bottom: 32px;
  }
  .headline span { color: #8b5cf6; }
  .source-row {
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin-top: 32px;
  }
  .source-item {
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 26px;
  }
  .rank {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 22px;
    flex-shrink: 0;
  }
  .rank-1 { background: #8b5cf6; color: #fff; }
  .rank-2 { background: #1e293b; color: #64748b; }
  .rank-3 { background: #1e293b; color: #64748b; }
  .source-name-1 { color: #fff; font-weight: 700; }
  .source-name { color: #64748b; }
  .footer {
    border-top: 1px solid #1e293b;
    padding-top: 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .footer-name { font-size: 24px; font-weight: 700; color: #fff; }
  .footer-title { font-size: 20px; color: #64748b; margin-top: 4px; }
  .footer-certs { font-size: 20px; color: #8b5cf6; font-weight: 600; }
</style>
</head>
<body>
  <div>
    <div class="tag">AI + LinkedIn</div>
    <div class="icon">🤖</div>
    <div class="headline">LinkedIn just became<br>the <span>#1 source</span> LLMs cite<br>for business advice.</div>
    <div class="source-row">
      <div class="source-item">
        <div class="rank rank-1">#1</div>
        <div class="source-name-1">LinkedIn (Real practitioners. Real experience.)</div>
      </div>
      <div class="source-item">
        <div class="rank rank-2">#2</div>
        <div class="source-name">Harvard Business Review</div>
      </div>
      <div class="source-item">
        <div class="rank rank-3">#3</div>
        <div class="source-name">McKinsey / Bloomberg</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div>
      <div class="footer-name">Ahmed Nasr</div>
      <div class="footer-title">Digital Transformation Executive</div>
    </div>
    <div class="footer-certs">PMP · CSM · CSPO</div>
  </div>
</body>
</html>
