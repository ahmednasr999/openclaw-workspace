<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: #0f172a;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 72px;
  }
  .tag {
    display: inline-block;
    background: #14b8a6;
    color: #0f172a;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 20px;
    border-radius: 4px;
    margin-bottom: 48px;
  }
  .versus {
    display: flex;
    gap: 32px;
    align-items: center;
    margin-bottom: 48px;
  }
  .side {
    flex: 1;
    padding: 32px;
    border-radius: 16px;
    text-align: center;
  }
  .side-intel { background: #1e3a5f; border: 2px solid #3b82f6; }
  .side-talabat { background: #2d1b00; border: 2px solid #f59e0b; }
  .side-icon { font-size: 56px; margin-bottom: 16px; }
  .side-name { font-size: 28px; font-weight: 900; margin-bottom: 8px; }
  .side-intel .side-name { color: #3b82f6; }
  .side-talabat .side-name { color: #f59e0b; }
  .side-lesson { font-size: 22px; color: #94a3b8; line-height: 1.4; }
  .vs {
    font-size: 48px;
    font-weight: 900;
    color: #334155;
    flex-shrink: 0;
  }
  .conclusion {
    font-size: 42px;
    font-weight: 900;
    color: #fff;
    line-height: 1.2;
    text-align: center;
  }
  .conclusion span { color: #14b8a6; }
  .footer {
    border-top: 1px solid #1e293b;
    padding-top: 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .footer-name { font-size: 24px; font-weight: 700; color: #fff; }
  .footer-title { font-size: 20px; color: #64748b; margin-top: 4px; }
  .footer-certs { font-size: 20px; color: #14b8a6; font-weight: 600; }
</style>
</head>
<body>
  <div>
    <div class="tag">Career Lessons</div>
    <div class="versus">
      <div class="side side-intel">
        <div class="side-icon">🔵</div>
        <div class="side-name">Intel</div>
        <div class="side-lesson">LTE/4G deployment<br>Taught me precision.<br>Process saves lives.</div>
      </div>
      <div class="vs">vs</div>
      <div class="side side-talabat">
        <div class="side-icon">🟡</div>
        <div class="side-name">Talabat</div>
        <div class="side-lesson">30K to 7M orders.<br>Taught me chaos.<br>Speed saves companies.</div>
      </div>
    </div>
    <div class="conclusion">
      <span>Both were right.</span><br>
      The skill is knowing which<br>one the moment requires.
    </div>
  </div>

  <div class="footer">
    <div>
      <div class="footer-name">Ahmed Nasr</div>
      <div class="footer-title">Digital Transformation Executive</div>
    </div>
    <div class="footer-certs">PMP · CSM · CSPO</div>
  </div>
</body>
</html>
