<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: #0f172a;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 72px;
  }
  .tag {
    display: inline-block;
    background: #3b82f6;
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 20px;
    border-radius: 4px;
    margin-bottom: 32px;
  }
  .years {
    font-size: 140px;
    font-weight: 900;
    color: #1e3a5f;
    line-height: 1;
    margin-bottom: 0;
  }
  .years-label {
    font-size: 32px;
    color: #3b82f6;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 4px;
    margin-bottom: 32px;
    margin-top: -8px;
  }
  .headline {
    font-size: 60px;
    font-weight: 900;
    color: #fff;
    line-height: 1.1;
    margin-bottom: 24px;
  }
  .headline span { color: #3b82f6; }
  .lesson {
    font-size: 28px;
    color: #94a3b8;
    line-height: 1.5;
    padding: 24px;
    background: #1e293b;
    border-radius: 12px;
    border-left: 4px solid #3b82f6;
  }
  .footer {
    border-top: 1px solid #1e293b;
    padding-top: 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .footer-name { font-size: 24px; font-weight: 700; color: #fff; }
  .footer-title { font-size: 20px; color: #64748b; margin-top: 4px; }
  .footer-certs { font-size: 20px; color: #3b82f6; font-weight: 600; }
</style>
</head>
<body>
  <div>
    <div class="tag">Leadership</div>
    <div class="years">20</div>
    <div class="years-label">Years in Tech</div>
    <div class="headline">Your title doesn't<br>define your <span>impact.</span></div>
    <div class="lesson">
      Intel. PaySky. Talabat. Network International. HealthTech.<br>
      Every role: different title. Same job.<br>
      Find the broken connections. Build the ones that matter.
    </div>
  </div>

  <div class="footer">
    <div>
      <div class="footer-name">Ahmed Nasr</div>
      <div class="footer-title">Digital Transformation Executive</div>
    </div>
    <div class="footer-certs">PMP · CSM · CSPO</div>
  </div>
</body>
</html>
