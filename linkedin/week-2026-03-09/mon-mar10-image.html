<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: #0f172a;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 72px;
  }
  .tag {
    display: inline-block;
    background: #14b8a6;
    color: #0f172a;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 20px;
    border-radius: 4px;
    margin-bottom: 48px;
  }
  .big-number {
    font-size: 120px;
    font-weight: 900;
    color: #14b8a6;
    line-height: 1;
    margin-bottom: 8px;
  }
  .number-label {
    font-size: 28px;
    color: #64748b;
    margin-bottom: 40px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .headline {
    font-size: 56px;
    font-weight: 900;
    color: #fff;
    line-height: 1.15;
    margin-bottom: 32px;
    max-width: 860px;
  }
  .subline {
    font-size: 28px;
    color: #94a3b8;
    line-height: 1.5;
  }
  .footer {
    border-top: 1px solid #1e293b;
    padding-top: 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .footer-name {
    font-size: 24px;
    font-weight: 700;
    color: #fff;
  }
  .footer-title {
    font-size: 20px;
    color: #64748b;
    margin-top: 4px;
  }
  .footer-certs {
    font-size: 20px;
    color: #14b8a6;
    font-weight: 600;
  }
  .bg-glow {
    position: absolute;
    left: -120px;
    bottom: 100px;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(20,184,166,0.06) 0%, transparent 70%);
  }
</style>
</head>
<body>
  <div class="bg-glow"></div>

  <div>
    <div class="tag">Health Catalyst</div>
    <div class="big-number">$1.5B</div>
    <div class="number-label">Validated Outcomes</div>
    <div class="headline">Here's what that number means<br>when you're the one<br>implementing it.</div>
    <div class="subline">Texas Children's cut hospital-acquired conditions by 35%.<br>The gap between buying and realizing is where programs die.</div>
  </div>

  <div class="footer">
    <div>
      <div class="footer-name">Ahmed Nasr</div>
      <div class="footer-title">Digital Transformation Executive</div>
    </div>
    <div class="footer-certs">PMP · CSM · CSPO</div>
  </div>
</body>
</html>
