<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: #0f172a;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 72px;
  }
  .tag {
    display: inline-block;
    background: #ef4444;
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 20px;
    border-radius: 4px;
    margin-bottom: 48px;
  }
  .icon {
    font-size: 80px;
    margin-bottom: 40px;
    line-height: 1;
  }
  .headline {
    font-size: 68px;
    font-weight: 900;
    color: #fff;
    line-height: 1.1;
    margin-bottom: 32px;
  }
  .headline span {
    color: #ef4444;
  }
  .subline {
    font-size: 30px;
    color: #94a3b8;
    line-height: 1.5;
    max-width: 800px;
  }
  .accent-bar {
    width: 80px;
    height: 6px;
    background: #ef4444;
    border-radius: 3px;
    margin-bottom: 40px;
  }
  .footer {
    border-top: 1px solid #1e3a5f;
    padding-top: 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .footer-name {
    font-size: 24px;
    font-weight: 700;
    color: #fff;
  }
  .footer-title {
    font-size: 20px;
    color: #64748b;
    margin-top: 4px;
  }
  .footer-certs {
    font-size: 20px;
    color: #3b82f6;
    font-weight: 600;
  }
  .bg-shape {
    position: absolute;
    right: -100px;
    top: -100px;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(239,68,68,0.08) 0%, transparent 70%);
  }
</style>
</head>
<body>
  <div class="bg-shape"></div>

  <div>
    <div class="tag">⚠ Warning</div>
    <div class="icon">🏥</div>
    <div class="accent-bar"></div>
    <div class="headline">GCC Healthcare<br>Is About To<br><span>Hit a Wall.</span></div>
    <div class="subline">The region is building hospitals at record speed.<br>The data infrastructure underneath is broken.</div>
  </div>

  <div class="footer">
    <div>
      <div class="footer-name">Ahmed Nasr</div>
      <div class="footer-title">Digital Transformation Executive</div>
    </div>
    <div class="footer-certs">PMP · CSM · CSPO</div>
  </div>
</body>
</html>
